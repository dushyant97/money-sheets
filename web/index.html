<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0c12" />
    <meta name="color-scheme" content="dark" />

    <title>Money Sheets — Offline expense tracker</title>
    <meta
      name="description"
      content="Offline-first personal expense and income tracker with CSV backup. No sign-in, no cloud, your data stays on your device."
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Money Sheets" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Money Sheets" />
    <meta
      property="og:description"
      content="Offline-first personal expense and income tracker with CSV backup."
    />

    <script>
      // Apply the saved/preferred theme before first paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem('money-sheets-theme');
          var mode =
            saved === 'light' || saved === 'dark'
              ? saved
              : window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
          document.documentElement.dataset.theme = mode;
          document.documentElement.style.colorScheme = mode;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', mode === 'light' ? '#f3f4f7' : '#0a0c12');
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
